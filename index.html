<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Barcode Scanner</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; }
    #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #007bff; }
    .status { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>Skener čárových kódů</h2>
<div id="status" class="status">Inicializace...</div>
<video id="video" autoplay playsinline></video>
<div id="result">Zatím nic nenaskenováno</div>

<script>
  const video = document.getElementById('video');
  const resultDiv = document.getElementById('result');
  const statusDiv = document.getElementById('status');

  async function startScanner() {
    // 1. Kontrola, zda prohlížeč API podporuje
    if (!('BarcodeDetector' in window)) {
      statusDiv.innerText = "Chyba: BarcodeDetector není v tomto prohlížeči podporován.";
      return;
    }

    const detector = new BarcodeDetector({
      formats: ['ean_13', 'code_128', 'qr_code', 'upc_a']
    });

    try {
      // 2. Přístup k zadní kameře mobilu
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      video.srcObject = stream;
      statusDiv.innerText = "Skener aktivní (zadní kamera)";

      // 3. Smyčka detekce
      setInterval(async () => {
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            const code = barcodes[0].rawValue;
            resultDiv.innerText = "Nalezen kód: " + code;

            // Volitelná haptická odezva (vibrace), pokud to mobil umí
            if (navigator.vibrate) navigator.vibrate(100);
          }
        } catch (e) {
          // Během ostření může detekce občas selhat, to ignorujeme
        }
      }, 500); // Kontrola každých 500ms

    } catch (err) {
      console.error(err);
      statusDiv.innerText = "Chyba: Nepodařilo se získat přístup k fotoaparátu.";
    }
  }

  startScanner();
</script>
</body>
</html>
